<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPL 3.0 — Player Pool</title>
  <meta name="description" content="View the full Nakre Premier League 3.0 player pool. Browse all registered players, filter by role, and explore player profiles.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-body: #060a14;
      --bg-card: rgba(15, 23, 42, 0.85);
      --bg-surface: rgba(20, 30, 58, 0.7);
      --border: rgba(255,255,255,0.07);
      --text-1: #f1f5f9;
      --text-2: #cbd5e1;
      --text-3: #64748b;
      --text-4: #475569;
      --accent-gold: #f59e0b;
      --accent-blue: #3b82f6;
      --accent-indigo: #6366f1;
      --accent-red: #ef4444;
      --accent-green: #10b981;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --transition: all 0.25s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-body);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(circle at 15% 10%, rgba(59,130,246,0.12), transparent 35%),
        radial-gradient(circle at 85% 90%, rgba(245,158,11,0.08), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(99,102,241,0.06), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    .pp-header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px 20px 32px;
      background:
        radial-gradient(circle at top center, rgba(245,158,11,0.14), transparent 34%),
        linear-gradient(155deg, rgba(17,25,67,0.96), rgba(9,12,32,0.98));
      border-bottom: 1px solid rgba(59,130,246,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .pp-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-gold), var(--accent-indigo));
    }
    .pp-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 999px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.18);
      color: var(--accent-blue);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .pp-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff7df, #f59e0b, #f3b46e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .pp-subtitle { color: var(--text-3); font-size: 0.95rem; }
    .pp-stats {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .pp-stat {
      padding: 12px 20px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      min-width: 90px;
    }
    .pp-stat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff4d5;
      display: block;
    }
    .pp-stat-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 4px;
      display: block;
    }

    /* ── Toolbar ── */
    .pp-toolbar {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 24px auto 0;
      padding: 0 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .pp-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .pp-filter-btn {
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-3);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .pp-filter-btn:hover {
      background: rgba(99,102,241,0.1);
      border-color: rgba(99,102,241,0.2);
      color: var(--text-1);
    }
    .pp-filter-btn.active {
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.15));
      border-color: rgba(99,102,241,0.4);
      color: #a5b4fc;
      box-shadow: 0 0 16px rgba(99,102,241,0.12);
    }
    .pp-search {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-1);
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      transition: var(--transition);
    }
    .pp-search::placeholder { color: var(--text-4); }
    .pp-search:focus {
      border-color: rgba(99,102,241,0.4);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }

    /* ── Grid ── */
    .pp-grid {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ── Player Card ── */
    .pp-card {
      position: relative;
      overflow: hidden;
      padding: 20px;
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.08), transparent 50%),
        linear-gradient(155deg, rgba(17,25,67,0.92), rgba(9,12,32,0.96));
      border: 1px solid rgba(59,130,246,0.1);
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
    }
    .pp-card::before {
      content: '';
      position: absolute;
      top: 0; left: 16px; right: 16px; height: 2px;
      background: linear-gradient(90deg, rgba(59,130,246,0.1), rgba(59,130,246,0.6), rgba(245,158,11,0.3));
      opacity: 0.7;
    }
    .pp-card:hover {
      transform: translateY(-5px);
      border-color: rgba(59,130,246,0.3);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }
    .pp-serial {
      position: absolute;
      top: 12px; left: 12px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.25);
      color: #a5b4fc;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
    }
    .pp-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      margin: 0 auto 12px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.2rem; color: #fff;
    }
    .pp-avatar img {
      width: 100%; height: 100%; object-fit: cover; object-position: top;
    }
    .pp-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .pp-badges {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .pp-badge {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
    }
    .pp-meta {
      font-size: 0.78rem;
      color: var(--text-3);
      margin-bottom: 4px;
    }
    .pp-base {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--accent-gold);
      margin-top: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.15);
      display: inline-block;
    }

    /* ── Empty State ── */
    .pp-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-4);
      font-size: 1rem;
    }

    /* ── Read-Only Badge ── */
    .pp-readonly-badge {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(99,102,241,0.2);
      color: var(--text-3);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .pp-readonly-badge span { color: var(--accent-indigo); }

    /* ── Footer ── */
    .pp-footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px 20px 48px;
      color: var(--text-4);
      font-size: 0.78rem;
    }
    .pp-footer a {
      color: var(--accent-gold);
      text-decoration: none;
      font-weight: 600;
    }
    .pp-footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .pp-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
      .pp-card { padding: 14px; }
      .pp-avatar { width: 56px; height: 56px; }
      .pp-name { font-size: 0.88rem; }
      .pp-header { padding: 32px 16px 24px; }
    }
  </style>
</head>
<body>

<div class="pp-header">
  <div class="pp-kicker">🏏 Nakre Premier League 3.0</div>
  <h1 class="pp-title">Player Pool</h1>
  <p class="pp-subtitle">Browse all registered players for the NPL 3.0 auction</p>
  <div class="pp-stats" id="pp-stats"></div>
</div>

<div class="pp-toolbar">
  <div class="pp-filters" id="pp-filters"></div>
  <input type="text" class="pp-search" id="pp-search" placeholder="🔍 Search players by name or location...">
</div>

<div class="pp-grid" id="pp-grid"></div>

<div class="pp-footer">
  <p>NPL 3.0 © 2026 — <a href="index.html">Go to Auction App</a></p>
  <p style="margin-top:6px; font-size:0.7rem;">This is a read-only public view of the player pool</p>
</div>

<div class="pp-readonly-badge">🔒 <span>Read-Only</span> · Public View</div>

<script type="module">
  import { PLAYERS_DATA } from './js/data.js?v=2';

  const ROLE_CONFIG = {
    'Batsman':       { icon: '🏏', color: '#3b82f6' },
    'Bowler':        { icon: '🎯', color: '#ef4444' },
    'All-Rounder':   { icon: '⭐', color: '#8b5cf6' },
    'Wicket-Keeper': { icon: '🧤', color: '#10b981' },
  };

  const roles = ['All', 'Batsman', 'Bowler', 'All-Rounder', 'Wicket-Keeper'];
  let currentFilter = 'All';
  let searchQuery = '';
  const allPlayers = [...PLAYERS_DATA].sort((a, b) =>
    a.name.localeCompare(b.name, undefined, { sensitivity: 'base' })
  );

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function fmt(n) {
    return n >= 1000 ? (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'K' : n;
  }

  function renderStats() {
    const batsmen = allPlayers.filter(p => p.role === 'Batsman').length;
    const bowlers = allPlayers.filter(p => p.role === 'Bowler').length;
    const ar = allPlayers.filter(p => p.role === 'All-Rounder').length;
    const wk = allPlayers.filter(p => p.isWK).length;
    document.getElementById('pp-stats').innerHTML = `
      <div class="pp-stat"><span class="pp-stat-num">${allPlayers.length}</span><span class="pp-stat-label">Total</span></div>
      <div class="pp-stat"><span class="pp-stat-num">${batsmen}</span><span class="pp-stat-label">Batsmen</span></div>
      <div class="pp-stat"><span class="pp-stat-num">${bowlers}</span><span class="pp-stat-label">Bowlers</span></div>
      <div class="pp-stat"><span class="pp-stat-num">${ar}</span><span class="pp-stat-label">All-Rounders</span></div>
      <div class="pp-stat"><span class="pp-stat-num">${wk}</span><span class="pp-stat-label">Keepers</span></div>
    `;
  }

  function renderFilters() {
    document.getElementById('pp-filters').innerHTML = roles.map(r => `
      <button class="pp-filter-btn ${currentFilter === r ? 'active' : ''}" data-role="${r}">
        ${r === 'All' ? '📋 All' : r === 'Wicket-Keeper' ? '🧤 WK' : (ROLE_CONFIG[r]?.icon || '') + ' ' + r}
      </button>
    `).join('');
  }

  function renderGrid() {
    let filtered = [...allPlayers];
    if (currentFilter === 'Wicket-Keeper') {
      filtered = filtered.filter(p => p.isWK);
    } else if (currentFilter !== 'All') {
      filtered = filtered.filter(p => p.role === currentFilter);
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.location.toLowerCase().includes(q)
      );
    }

    if (filtered.length === 0) {
      document.getElementById('pp-grid').innerHTML = '<div class="pp-empty">No players found matching your criteria</div>';
      return;
    }

    document.getElementById('pp-grid').innerHTML = filtered.map((p, i) => {
      const role = ROLE_CONFIG[p.role] || { icon: '', color: '#6366f1' };
      const serialNo = allPlayers.findIndex(a => a.name === p.name) + 1;
      const abbr = (s) => !s || s === 'N/A' ? '—' : s.replace('Right ', 'R-').replace('Left ', 'L-').replace('Hand', 'H').replace('Arm', 'A');
      return `
        <div class="pp-card">
          <div class="pp-serial">${serialNo}</div>
          <div class="pp-avatar" style="background: linear-gradient(135deg, ${role.color}, ${role.color}88);">
            ${p.image ? `<img src="${p.image}" alt="${p.name}">` : getInitials(p.name)}
          </div>
          <div class="pp-name">${p.name}</div>
          <div class="pp-badges">
            <span class="pp-badge" style="background:${role.color}22;color:${role.color};">${role.icon} ${p.role}</span>
            ${p.isWK ? '<span class="pp-badge" style="background:rgba(16,185,129,0.15);color:#10b981;">🧤 WK</span>' : ''}
          </div>
          <div class="pp-meta">📍 ${p.location} · ${abbr(p.batting)} / ${abbr(p.bowling)}</div>
          <div class="pp-base">Base: ${fmt(p.basePrice)} pts</div>
        </div>
      `;
    }).join('');
  }

  // Init
  renderStats();
  renderFilters();
  renderGrid();

  // Filter clicks
  document.getElementById('pp-filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.pp-filter-btn');
    if (!btn) return;
    currentFilter = btn.dataset.role;
    renderFilters();
    renderGrid();
  });

  // Search
  document.getElementById('pp-search').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderGrid();
  });
</script>

</body>
</html>
