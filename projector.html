<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAKRE PREMIER LEAGUE 3.0 — Live Projector</title>
  <meta name="description" content="Live auction projector view for NAKRE PREMIER LEAGUE 3.0">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ════════════════════════════════════════════
       PROJECTOR — Ultra Premium Design System
       ════════════════════════════════════════════ */

    :root {
      --bg-primary:    #050816;
      --bg-card:       rgba(15, 20, 55, 0.85);
      --bg-card-solid: #0d1235;

      --accent-blue:   #3b82f6;
      --accent-gold:   #f59e0b;
      --accent-green:  #10b981;
      --accent-red:    #ef4444;
      --accent-indigo: #6366f1;

      --text-1: #f1f5f9;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --text-4: #475569;

      --border:       rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.12);
      --glass:        rgba(255,255,255,0.04);
      --glass-heavy:  rgba(255,255,255,0.07);

      --radius-md:  12px;
      --radius-lg:  16px;
      --radius-xl:  24px;
      --radius-full: 9999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-1);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ── Animated background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(59,130,246,0.14), transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 100%, rgba(245,158,11,0.08), transparent 52%),
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(239,68,68,0.05), transparent 56%);
      pointer-events: none;
      z-index: 0;
      animation: bgShift 20s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0%   { opacity: 0.85; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.03); }
    }

    /* ── Video Background Stage ── */
    .proj-bg-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 18%, rgba(245, 158, 11, 0.18), transparent 34%),
        radial-gradient(circle at 18% 22%, rgba(99, 102, 241, 0.16), transparent 32%),
        linear-gradient(180deg, #040916 0%, #071126 48%, #040812 100%);
    }
    .proj-bg-stage__poster,
    .proj-bg-stage__video,
    .proj-bg-stage__glow,
    .proj-bg-stage__overlay {
      position: absolute;
      inset: 0;
    }
    .proj-bg-stage__poster {
      background: url('images/cricket-bg-poster.svg') center/cover no-repeat;
      transform: scale(1.04);
      filter: saturate(1.15) contrast(1.05) brightness(0.65);
      opacity: 0.96;
    }
    .proj-bg-stage__video {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.08);
      filter: saturate(1.2) contrast(1.05) brightness(0.7);
      transition: opacity 0.8s ease;
      animation: projBgDrift 26s ease-in-out infinite alternate;
    }
    .proj-bg-stage.is-video-ready .proj-bg-stage__video {
      opacity: 0.94;
    }
    .proj-bg-stage.is-video-ready .proj-bg-stage__poster {
      opacity: 0.34;
    }
    .proj-bg-stage__glow {
      background:
        radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.24), transparent 30%),
        radial-gradient(circle at 16% 30%, rgba(99, 102, 241, 0.2), transparent 34%),
        radial-gradient(circle at 86% 74%, rgba(59, 130, 246, 0.14), transparent 28%);
      mix-blend-mode: screen;
      opacity: 0.5;
    }
    .proj-bg-stage__overlay {
      background:
        linear-gradient(180deg, rgba(2, 6, 23, 0.15) 0%, rgba(2, 6, 23, 0.25) 18%, rgba(2, 6, 23, 0.55) 100%),
        radial-gradient(circle at center, transparent 18%, rgba(2, 6, 23, 0.3) 100%);
    }
    @keyframes projBgDrift {
      from { transform: scale(1.08) translate3d(0, 0, 0); }
      to   { transform: scale(1.14) translate3d(-1.2%, -1%, 0); }
    }

    /* ── Layout ── */
    .projector-root {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      padding: 20px 30px;
      gap: 16px;
    }

    /* ── Top Bar ── */
    .proj-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
    }
    .proj-brand {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-gold) 0%, #fff 40%, var(--accent-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    .proj-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-3);
    }
    .proj-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-red);
      box-shadow: 0 0 8px rgba(239,68,68,0.5);
      transition: all 0.5s ease;
    }
    .proj-status-dot.connected {
      background: var(--accent-green);
      box-shadow: 0 0 8px rgba(16,185,129,0.5);
      animation: statusPulse 2s ease-in-out infinite;
    }
    @keyframes statusPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(16,185,129,0.5); }
      50%      { box-shadow: 0 0 16px rgba(16,185,129,0.8); }
    }

    /* ── Main Content Area ── */
    .proj-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(30px, 4vw, 80px);
      min-height: 0;
    }

    /* ── Waiting State ── */
    .proj-waiting {
      text-align: center;
      animation: fadeInUp 0.6s ease;
    }
    .proj-waiting-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    .proj-waiting-text {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: 700;
      color: var(--text-2);
      margin-bottom: 12px;
    }
    .proj-waiting-sub {
      font-size: 1rem;
      color: var(--text-4);
    }
    .proj-waiting-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    @keyframes spotlightPulse {
      0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
      50%      { opacity: 1; transform: translateX(-50%) scale(1.15); }
    }

    /* ── Player Card ── */
    .proj-player-area {
      flex: 0 0 auto;
      width: clamp(280px, 25vw, 420px);
      animation: fadeInLeft 0.5s ease;
    }
    .proj-player-card {
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: var(--bg-card);
      border: 2px solid rgba(59,130,246,0.16);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.5),
        0 0 44px rgba(59,130,246,0.1);
      position: relative;
      transition: all 0.4s ease;
    }
    .proj-player-card:hover {
      box-shadow:
        0 24px 70px rgba(0,0,0,0.6),
        0 0 60px rgba(59,130,246,0.18),
        0 0 36px rgba(245,158,11,0.08);
      transform: translateY(-4px);
    }
    .proj-player-img {
      width: 100%;
      aspect-ratio: 3/4;
      background: linear-gradient(135deg, #0b1131, #16265a);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }
    .proj-player-img::after {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      width: 80%;
      height: 60%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(59,130,246,0.3), rgba(245,158,11,0.1) 50%, transparent 70%);
      filter: blur(40px);
      z-index: 0;
      animation: spotlightPulse 4s ease-in-out infinite;
    }
    .proj-player-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      position: relative;
      z-index: 1;
    }
    .proj-player-img .proj-initial {
      font-family: 'Outfit', sans-serif;
      font-size: 6rem;
      font-weight: 900;
      color: rgba(255,255,255,0.12);
      position: relative;
      z-index: 1;
    }
    .proj-player-body {
      padding: clamp(16px, 2vw, 30px);
      text-align: center;
      background: linear-gradient(180deg, rgba(13,18,53,0.95), rgba(7,8,22,0.98));
    }
    .proj-player-name {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.4rem, 2.2vw, 2.2rem);
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .proj-player-role {
      display: inline-block;
      padding: 8px 20px;
      border-radius: var(--radius-full);
      font-size: clamp(0.7rem, 1vw, 0.95rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.3px;
      margin-bottom: 16px;
      border: 1px solid currentColor;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .proj-player-role.batsman   { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .proj-player-role.bowler    { background: rgba(239,68,68,0.15); color: #ef4444; }
    .proj-player-role.allrounder { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .proj-player-base {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-md);
      border: 1px solid rgba(59,130,246,0.12);
    }
    .proj-player-base-label {
      font-size: 0.75rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .proj-player-base-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-gold);
    }

    /* ── Player card overlay (SOLD / UNSOLD) ── */
    .proj-card-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      animation: overlayIn 0.4s ease;
    }
    .proj-card-overlay.sold {
      background: rgba(16,185,129,0.25);
      backdrop-filter: blur(4px);
    }
    .proj-card-overlay.unsold {
      background: rgba(239,68,68,0.2);
      backdrop-filter: blur(4px);
    }
    .proj-card-overlay-text {
      font-family: 'Outfit', sans-serif;
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 6px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .proj-card-overlay.sold .proj-card-overlay-text   { color: var(--accent-green); }
    .proj-card-overlay.unsold .proj-card-overlay-text { color: var(--accent-red); }
    @keyframes overlayIn {
      0%   { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ── Info Area (Right Side) ── */
    .proj-info-area {
      flex: 1;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 1.5vw, 24px);
      animation: fadeInRight 0.5s ease;
      min-height: 0;
    }

    /* ── Team Budget Warning Banner ── */
    .proj-team-warning {
      min-height: 0;
      transition: all 0.3s ease;
    }
    .proj-warning-inner {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.35);
      border-radius: var(--radius-lg);
      padding: clamp(12px, 1.5vw, 24px) clamp(16px, 2vw, 32px);
      text-align: center;
      margin-bottom: clamp(10px, 1.2vw, 18px);
      backdrop-filter: blur(12px);
      animation: warningFadeIn 0.4s ease;
    }
    .proj-warning-inner.caution {
      background: rgba(245, 158, 11, 0.2);
      border-color: rgba(245, 158, 11, 0.5);
    }
    .proj-warning-inner.critical {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.5);
      animation: warningFadeIn 0.4s ease, warningPulse 2s ease-in-out infinite;
    }
    @keyframes warningFadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes warningPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
      50%      { box-shadow: 0 0 20px 4px rgba(239, 68, 68, 0.2); }
    }
    .proj-warning-team {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.1rem, 1.8vw, 1.8rem);
      font-weight: 800;
      margin-bottom: 4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .proj-warning-stats {
      font-size: clamp(0.95rem, 1.4vw, 1.5rem);
      font-weight: 600;
      color: var(--accent-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .proj-warning-purse {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
    }
    .proj-warning-sep {
      color: var(--text-4);
      font-size: 0.8em;
    }
    .proj-warning-slots {
      color: var(--text-2);
    }
    .proj-warning-inner.critical .proj-warning-stats {
      color: var(--accent-red);
    }
    .proj-warning-inner.critical .proj-warning-slots {
      color: rgba(239, 68, 68, 0.8);
    }

    /* ── Bid Status Box ── */
    .proj-bid-box {
      background: linear-gradient(180deg, rgba(15,20,55,0.92), rgba(7,8,22,0.98));
      border: 2px solid rgba(59,130,246,0.16);
      border-radius: var(--radius-xl);
      padding: clamp(20px, 2.5vw, 40px);
      text-align: center;
      box-shadow:
        0 20px 48px rgba(0,0,0,0.45),
        0 0 36px rgba(59,130,246,0.08),
        inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }
    .proj-bid-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent-blue), var(--accent-gold), var(--accent-blue), transparent);
      background-size: 220% 100%;
      animation: bidShine 4s linear infinite;
    }
    .proj-bid-box::after {
      content: '';
      position: absolute;
      right: -40px;
      bottom: -60px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 68%);
      pointer-events: none;
    }
    @keyframes bidShine {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .proj-bid-label {
      font-size: clamp(0.85rem, 1.2vw, 1.2rem);
      color: var(--accent-blue);
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .proj-bid-label.sold-label   { color: var(--accent-green); }
    .proj-bid-label.unsold-label { color: var(--accent-red); }

    .proj-bid-amount {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2.5rem, 5.5vw, 5rem);
      font-weight: 800;
      color: var(--accent-gold);
      line-height: 1;
      margin-bottom: 12px;
      text-shadow: 0 0 40px rgba(245,158,11,0.25);
      transition: all 0.3s ease;
      animation: bidGlow 3s ease-in-out infinite;
    }
    .proj-bid-amount.flash {
      animation: bidGlow 3s ease-in-out infinite, bidFlash 0.4s ease;
    }
    @keyframes bidGlow {
      0%, 100% { text-shadow: 0 0 24px rgba(245,158,11,0.28); }
      50%      { text-shadow: 0 0 48px rgba(245,158,11,0.45), 0 0 82px rgba(245,158,11,0.18); }
    }
    @keyframes bidFlash {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.08); text-shadow: 0 0 60px rgba(245,158,11,0.5); }
      100% { transform: scale(1); }
    }

    .proj-bidder {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-size: clamp(1.2rem, 2vw, 2rem);
      font-weight: 700;
      min-height: 50px;
    }
    .proj-bidder img {
      width: clamp(36px, 3.5vw, 56px);
      height: clamp(36px, 3.5vw, 56px);
      object-fit: contain;
      border-radius: 50%;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.25);
      box-shadow: 0 0 0 2px rgba(59,130,246,0.28), 0 0 22px rgba(59,130,246,0.2);
    }
    .proj-bidder-none {
      color: var(--text-4);
      font-weight: 500;
      font-size: 1.1rem;
    }

    /* ── Timer Ring ── */
    .proj-timer-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .proj-timer-ring-container {
      position: relative;
      width: clamp(140px, 14vw, 200px);
      height: clamp(140px, 14vw, 200px);
    }
    .proj-timer-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .proj-timer-bg {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 7;
    }
    .proj-timer-progress {
      fill: none;
      stroke: var(--accent-blue);
      stroke-width: 7;
      stroke-linecap: round;
      transition: stroke 0.35s ease, filter 0.35s ease;
      filter: drop-shadow(0 0 10px rgba(59,130,246,0.35));
    }
    .proj-timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .proj-timer-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 800;
      color: var(--text-1);
      line-height: 1;
      transition: color 0.5s ease;
      text-shadow: 0 0 18px rgba(59,130,246,0.12);
    }
    .proj-timer-label {
      font-size: 0.65rem;
      color: var(--accent-blue);
      text-transform: uppercase;
      letter-spacing: 2.4px;
      font-weight: 700;
      margin-top: 4px;
    }
    .proj-timer-ring-container.warning .proj-timer-progress {
      stroke: var(--accent-gold);
      filter: drop-shadow(0 0 14px rgba(245,158,11,0.45));
    }
    .proj-timer-ring-container.warning .proj-timer-value    { color: var(--accent-gold); }
    .proj-timer-ring-container.danger .proj-timer-progress  {
      stroke: var(--accent-red);
      filter: drop-shadow(0 0 16px rgba(239,68,68,0.5));
    }
    .proj-timer-ring-container.danger .proj-timer-value     { color: var(--accent-red); }
    .proj-timer-ring-container.danger {
      animation: timerPulse 0.8s ease-in-out infinite;
    }
    @keyframes timerPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 rgba(239,68,68,0); }
      50%      { transform: scale(1.06); box-shadow: 0 0 30px rgba(239,68,68,0.22); }
    }

    /* ── Sold/Unsold result in timer area ── */
    .proj-result-badge {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.5rem, 5vw, 5rem);
      font-weight: 900;
      letter-spacing: 4px;
      text-align: center;
      animation: resultBounce 0.5s ease;
    }
    .proj-result-badge.sold {
      color: var(--accent-green);
      text-shadow: 0 0 40px rgba(16,185,129,0.4);
    }
    .proj-result-badge.unsold {
      color: var(--accent-red);
      text-shadow: 0 0 40px rgba(239,68,68,0.4);
    }
    @keyframes resultBounce {
      0%   { opacity: 0; transform: scale(0.5); }
      60%  { transform: scale(1.15); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ── Bid History ── */
    .proj-bid-history {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      backdrop-filter: blur(12px);
      max-height: 140px;
      overflow: hidden;
    }
    .proj-bid-history-title {
      font-size: 0.65rem;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .proj-bid-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 0.8rem;
      animation: slideIn 0.3s ease;
    }
    .proj-bid-entry + .proj-bid-entry {
      border-top: 1px solid var(--border);
    }
    .proj-bid-team {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }
    .proj-bid-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .proj-bid-amt {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--accent-gold);
      font-size: 0.78rem;
    }
    @keyframes slideIn {
      0%   { opacity: 0; transform: translateX(-10px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    /* ── Bottom Bar ── */
    .proj-bottombar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(12px);
    }
    .proj-progress {
      display: flex;
      gap: 24px;
      font-size: 0.8rem;
      color: var(--text-3);
      font-weight: 500;
    }
    .proj-progress-value {
      font-weight: 700;
      margin-left: 4px;
    }
    .proj-progress-value.sold   { color: var(--accent-green); }
    .proj-progress-value.unsold { color: var(--accent-red); }
    .proj-progress-value.remaining { color: var(--accent-blue); }

    .proj-controls {
      display: flex;
      gap: 8px;
    }
    .proj-btn {
      padding: 8px 16px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      background: var(--glass-heavy);
      color: var(--text-2);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .proj-btn:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-1);
      border-color: rgba(255,255,255,0.2);
    }

    /* ── Disconnected state ── */
    .proj-disconnected {
      text-align: center;
      animation: fadeInUp 0.6s ease;
    }
    .proj-disconnected-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: spin 2s linear infinite;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .proj-disconnected-text {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-3);
    }

    /* ── Celebration Overlay ── */
    .proj-celebration-canvas {
      position: fixed;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
    }
    .proj-celebration-overlay {
      position: fixed;
      inset: 0;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .proj-celebration-overlay.active { opacity: 1; }
    .proj-celebration-overlay.fade-out { opacity: 0; transition: opacity 0.8s ease; }

    .proj-celeb-text {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(5rem, 12vw, 10rem);
      font-weight: 900;
      letter-spacing: 8px;
      text-align: center;
      animation: celebTextIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .proj-celeb-text.sold {
      color: #10b981;
      text-shadow:
        0 0 40px rgba(16,185,129,0.6),
        0 0 80px rgba(16,185,129,0.3),
        0 4px 20px rgba(0,0,0,0.5);
    }
    .proj-celeb-text.unsold {
      color: #ef4444;
      text-shadow:
        0 0 40px rgba(239,68,68,0.6),
        0 0 80px rgba(239,68,68,0.3),
        0 4px 20px rgba(0,0,0,0.5);
      animation: celebTextIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 unsoldShake 0.5s ease 0.7s;
    }

    .proj-celeb-subtext {
      margin-top: 16px;
      font-size: clamp(1.4rem, 3vw, 2.8rem);
      font-weight: 700;
      opacity: 0;
      animation: celebSubIn 0.5s ease 0.6s forwards;
    }
    .proj-celeb-price {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.8rem, 4vw, 3.5rem);
      font-weight: 800;
      color: var(--accent-gold);
      text-shadow: 0 0 30px rgba(245,158,11,0.4), 0 4px 12px rgba(0,0,0,0.4);
      margin-top: 8px;
      opacity: 0;
      animation: celebSubIn 0.5s ease 0.9s forwards;
    }

    @keyframes celebTextIn {
      0%   { opacity: 0; transform: scale(0.3) rotate(-5deg); }
      60%  { opacity: 1; transform: scale(1.15) rotate(1deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes celebSubIn {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes unsoldShake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    /* ── Unsold vignette ── */
    .proj-unsold-vignette {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(239,68,68,0.15) 100%);
      animation: vignetteIn 0.5s ease forwards;
    }
    @keyframes vignetteIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ── Generic animations ── */
    @keyframes fadeInUp {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInLeft {
      0%   { opacity: 0; transform: translateX(-30px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInRight {
      0%   { opacity: 0; transform: translateX(30px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    /* ── Recall Banner ── */
    .proj-recall-banner {
      text-align: center;
      animation: fadeInUp 0.5s ease;
      position: relative;
    }
    .proj-recall-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 500px;
      height: 500px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(245,158,11,0.18) 0%, transparent 70%);
      pointer-events: none;
      animation: recallGlowPulse 2s ease-in-out infinite;
    }
    @keyframes recallGlowPulse {
      0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
    }
    .proj-recall-icon {
      font-size: clamp(4rem, 8vw, 7rem);
      margin-bottom: 12px;
      animation: recallIconSpin 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      z-index: 1;
    }
    @keyframes recallIconSpin {
      0%   { opacity: 0; transform: rotate(-180deg) scale(0.3); }
      60%  { transform: rotate(15deg) scale(1.1); }
      100% { opacity: 1; transform: rotate(0deg) scale(1); }
    }
    .proj-recall-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--accent-gold);
      text-shadow: 0 0 40px rgba(245,158,11,0.5), 0 4px 20px rgba(0,0,0,0.5);
      margin-bottom: 16px;
      animation: celebTextIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      z-index: 1;
    }
    .proj-recall-player {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.6rem, 3.5vw, 3rem);
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: 12px;
      opacity: 0;
      animation: celebSubIn 0.5s ease 0.4s forwards;
      position: relative;
      z-index: 1;
    }
    .proj-recall-detail {
      font-size: clamp(1rem, 2vw, 1.6rem);
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 20px;
      opacity: 0;
      animation: celebSubIn 0.5s ease 0.6s forwards;
      position: relative;
      z-index: 1;
    }
    .proj-recall-sub {
      font-size: clamp(0.85rem, 1.4vw, 1.2rem);
      color: var(--text-4);
      font-weight: 500;
      opacity: 0;
      animation: celebSubIn 0.5s ease 0.8s forwards;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Video Background Stage -->
  <div class="proj-bg-stage" id="proj-bg-stage" aria-hidden="true">
    <div class="proj-bg-stage__poster"></div>
    <video class="proj-bg-stage__video" id="proj-bg-video" muted loop playsinline preload="metadata" tabindex="-1">
      <source src="media/cricket-bg.mp4" type="video/mp4">
    </video>
    <div class="proj-bg-stage__glow"></div>
    <div class="proj-bg-stage__overlay"></div>
  </div>

  <div class="projector-root" id="projector-root">
    <!-- Top Bar -->
    <div class="proj-topbar">
      <div class="proj-brand">NAKRE PREMIER LEAGUE 3.0</div>
      <div class="proj-status">
        <div class="proj-status-dot" id="proj-status-dot"></div>
        <span id="proj-status-text">Connecting...</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="proj-main" id="proj-main">
      <div class="proj-waiting">
        <div class="proj-waiting-icon">🏏</div>
        <div class="proj-waiting-text">Waiting for Auctioneer<span class="proj-waiting-dots"></span></div>
        <div class="proj-waiting-sub">The auction will appear here when started</div>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="proj-bottombar" id="proj-bottombar">
      <div class="proj-progress" id="proj-progress">
        <span>Player <span class="proj-progress-value remaining" id="proj-player-count">—</span></span>
        <span>Sold <span class="proj-progress-value sold" id="proj-sold-count">0</span></span>
        <span>Unsold <span class="proj-progress-value unsold" id="proj-unsold-count">0</span></span>
        <span>Remaining <span class="proj-progress-value remaining" id="proj-remaining-count">—</span></span>
      </div>
      <div class="proj-controls">
        <button class="proj-btn" id="proj-fullscreen-btn">⛶ Fullscreen</button>
      </div>
    </div>
  </div>

  <!-- Celebration Canvas (fireworks / particles — rendered by JS) -->
  <canvas id="proj-fireworks-canvas" class="proj-celebration-canvas" style="display:none;"></canvas>

  <!-- Celebration Text Overlay -->
  <div id="proj-celebration-overlay" class="proj-celebration-overlay"></div>

  <script src="js/projector-celebration.js"></script>
  <script src="js/projector.js"></script>
  <script>
    // Auto-play video background for projector
    document.addEventListener('DOMContentLoaded', () => {
      const stage = document.getElementById('proj-bg-stage');
      const video = document.getElementById('proj-bg-video');
      if (!stage || !video) return;

      video.muted = true;
      video.defaultMuted = true;
      video.loop = true;
      video.playsInline = true;

      video.play().then(() => {
        stage.classList.add('is-video-ready');
      }).catch(() => {
        console.log('[Projector] Video autoplay blocked, using poster fallback');
      });

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          video.pause();
        } else {
          video.play().catch(() => {});
        }
      });

      video.addEventListener('error', () => {
        console.log('[Projector] Video error, keeping poster');
      });
    });
  </script>
</body>
</html>
